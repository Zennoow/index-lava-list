<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Lava - Collection Brainrot</title>
    <style>
        :root {
            --lava-bg: #0d0402;
            --lava-core: #ff4500;
            --lava-glow: #ff8c00;
            --lava-text: #ffffff;
            --lava-card: rgba(255, 69, 0, 0.05);
            --success: #00ff88;
        }

        html {
            scroll-behavior: smooth; /* Pour un retour en haut fluide */
        }

        body {
            background: var(--lava-bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #4a1505 0%, transparent 50%),
                linear-gradient(to bottom, #0d0402, #1a0a05);
            color: var(--lava-text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 40px 15px 60px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .lava-header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(to bottom, #fff 30%, var(--lava-core) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.7));
            text-align: center;
        }

        .filter-container {
            margin-bottom: 20px;
            z-index: 101;
        }

        select {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 1px solid var(--lava-core);
            padding: 8px 15px;
            border-radius: 10px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.3);
            transition: 0.3s;
        }

        .stats {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--lava-core);
            padding: 12px 30px;
            border-radius: 50px;
            margin: 10px 0 30px 0;
            font-weight: bold;
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.4);
            position: sticky;
            top: 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
            font-family: monospace;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--lava-card);
            border: 1px solid rgba(255, 69, 0, 0.2);
            padding: 18px 22px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-left: 5px solid var(--lava-core);
        }

        .card.hidden { display: none; }

        .card.checked {
            border-left-color: var(--success);
            background: rgba(0, 255, 136, 0.08);
        }

        .card.checked span {
            color: var(--success);
            opacity: 0.6;
            text-decoration: line-through;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--lava-core);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card.checked .checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .card.checked .checkbox::after {
            content: "✓";
            color: #000;
            font-weight: 900;
        }

        /* --- BOUTON RETOUR EN HAUT (IMAGE) --- */
        .back-to-top {
            margin-top: 50px;
            width: 120px; /* Taille réduite */
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px var(--lava-core));
            animation: float 3s ease-in-out infinite;
        }

        .back-to-top:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px var(--lava-glow));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="top" class="lava-header-container">
        <h1>INDEX LAVA</h1>
    </div>

    <div class="filter-container">
        <select id="filterSelect">
            <option value="all">TOUT VOIR (MIX)</option>
            <option value="obtained">OBTENUS SEULEMENT</option>
            <option value="missing">MANQUANTS SEULEMENT</option>
        </select>
    </div>

    <div class="stats" id="counter">CHARGEMENT...</div>

    <div class="grid" id="container"></div>

    <a href="#top">
        <img src="https://steal-a-brainrot.wiki/wp-content/uploads/2025/07/Lava-Mutation.png" alt="Retour en haut" class="back-to-top">
    </a>

    <script>
        const items = [
            "Bombardini Tortinii", "Tractor Dinosaurio", "Los Orcalitos", "Pinguino Salamino",
            "Job Job Job Sahur", "Karkerkar Kurkur", "Gorillo Watermelondrillo", "Tracoducotulu Delapeladuzcruz",
            "Pinguino Cocosino", "Te Te Te Sahur", "Pipi Avocado", "Las Vaquitas Saturnitas",
            "Chicleteira Bicicliteira", "Los Combinasionas", "Esok Sekolah", "Pichione De Maquina",
            "Frigo Camello", "Perochello lemonchello", "Noobini pizzanini", "Boneca Ambalabu",
            "Tralalero Tralala", "Odin Din Din Dun", "Chef Abracadra", "Cocofanto Elefanto",
            "Brri Brri Bicis Dicus Bombicus", "Burbaloni Loliloli", "Brr Brr Patapin", "Tigrilini Watermelini",
            "Tripi Tropi", "Bandito Bobritto", "Tim Cheese", "La Vaca Saturno Saturnita",
            "Pipi kiwi", "Pandacini Bananini", "Girafa Celestre", "Gangster Fotera",
            "Las Tralaleritas", "Ta ta ta sahur", "Rhino tosterino", "Gattatino Nyanino",
            "Talpa De Fero", "Bombobini Crostini", "Sammyni Spyderini", "Tigroligre frutonni",
            "Glorbo Frutodrillo", "Orcalero Orcala", "Blueberrinni Octopussini", "Balerino Lololo",
            "Lionel Cactuseli", "Matteo", "Capuchino Assasino", "Capuchina Assasina",
            "Los Tungtungtungcitos", "Los Crocodilitos", "Tipi Topi Taco", "Tralalita Tralala",
            "Garama And Madundung", "Unclito Samito", "Los Matteos",
            "No My Hotspot", "Cocosini Mama", "Avocadorilla", "Agarrini La Palini",
            "Tucano Banano", "Ti Ti Ti Sahur", "Urubini Flamenguini", "Pipi Corni",
            "Bulbito Bandito Traktorito", "Tripi Tropi Tripi Tripa", "Sigma Boy",
            "Pot Hospot", "Nuclearo Dinossauro", "Trenostruzzo Turbo 3000", "Tortuguini Dragonfrutini",
            "La Grande Combinasionn", "Spioniro Golubiro", "Abocadini Guffo", "Bombardino Crocodilo",
            "Espressora Señora", "Caballo Virtuoso", "Trulimero Trulichina",
            "Bombobini Gussini", "Bananita Dolphinita", "Graipuss Medusi", "Lirili Larila",
            "Orangutni Ananassini", "Tric Trac Baraboom", "Zibra Zubra Zibralini",
            "Los Tralaleritos", "Strawberrili Flamengini", "Cacto Hipopotamo", "Chimpanzini Bannanini"
        ].sort();

        const container = document.getElementById('container');
        const counter = document.getElementById('counter');
        const filterSelect = document.getElementById('filterSelect');

        function updateCounter() {
            const checkedCount = document.querySelectorAll('.card.checked').length;
            counter.innerText = `LAVA COLLECTED: ${checkedCount} / ${items.length}`;
        }

        function applyFilter() {
            const filterValue = filterSelect.value;
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => {
                const isObtained = card.classList.contains('checked');
                if (filterValue === 'all') card.classList.remove('hidden');
                else if (filterValue === 'obtained') isObtained ? card.classList.remove('hidden') : card.classList.add('hidden');
                else if (filterValue === 'missing') !isObtained ? card.classList.remove('hidden') : card.classList.add('hidden');
            });
        }

        items.forEach((name) => {
            const saveKey = 'lava_final_v4_' + name.replace(/\s/g, '_');
            const isChecked = localStorage.getItem(saveKey) === 'true';
            const card = document.createElement('div');
            card.className = `card ${isChecked ? 'checked' : ''}`;
            card.innerHTML = `<span>${name}</span><div class="checkbox"></div>`;
            card.addEventListener('click', () => {
                const nowChecked = !card.classList.contains('checked');
                card.classList.toggle('checked');
                localStorage.setItem(saveKey, nowChecked);
                updateCounter();
                applyFilter();
            });
            container.appendChild(card);
        });

        filterSelect.addEventListener('change', applyFilter);
        updateCounter();
    </script>
</body>
</html>

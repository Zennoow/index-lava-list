<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Lava - Collection Brainrot</title>
    <style>
        :root {
            --lava-bg: #0d0402;
            --lava-core: #ff4500;
            --lava-glow: #ff8c00;
            --lava-text: #ffffff;
            --lava-card: rgba(255, 69, 0, 0.05);
            --success: #00ff88;
        }

        body {
            background: var(--lava-bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #4a1505 0%, transparent 50%),
                linear-gradient(to bottom, #0d0402, #1a0a05);
            color: var(--lava-text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px 15px 60px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Éléments Visuels --- */
        .lava-header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 30px;
        }

        .base-img {
            width: 250px;
            height: auto;
            filter: drop-shadow(0 0 20px var(--lava-core));
            margin-bottom: -40px;
            z-index: 1;
        }

        .mutation-mascot {
            position: absolute;
            width: 120px;
            right: -100px;
            top: 60%;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px var(--lava-glow));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-15px) rotate(-5deg); }
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            background: linear-gradient(to bottom, #fff 20%, var(--lava-core) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.6));
            text-align: center;
            z-index: 2;
        }

        /* --- Reste du style --- */
        .stats {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--lava-core);
            padding: 12px 30px;
            border-radius: 50px;
            margin: 20px 0 40px 0;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.3);
            position: sticky;
            top: 20px;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--lava-card);
            border: 1px solid rgba(255, 69, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            cursor: pointer;
            border-left: 4px solid var(--lava-core);
        }

        .card:hover {
            background: rgba(255, 69, 0, 0.15);
            transform: scale(1.02);
            border-color: var(--lava-glow);
        }

        .card.checked {
            border-left-color: var(--success);
            background: rgba(0, 255, 136, 0.05);
        }

        .card.checked span {
            color: var(--success);
            opacity: 0.7;
            text-decoration: line-through;
        }

        .checkbox {
            width: 25px;
            height: 25px;
            border: 2px solid var(--lava-core);
            border-radius: 6px;
            position: relative;
            transition: 0.3s;
        }

        .card.checked .checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .card.checked .checkbox::after {
            content: "✓";
            position: absolute;
            color: #000;
            font-weight: bold;
            left: 5px;
            top: 0px;
        }

        @media (max-width: 600px) {
            .mutation-mascot { display: none; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="lava-header-container">
        <img src="all-server-rebirthing-accountlava-base.webp" alt="Lava Base" class="base-img">
        
        <h1>INDEX LAVA</h1>
        
        <img src="Lava-Mutation.png" alt="Lava Mutation" class="mutation-mascot">
    </div>

    <div class="stats" id="counter">Obtenus : 0 / 0</div>

    <div class="grid" id="container"></div>

    <script>
        const items = [
            "Bombardini tortini", "Tractor dinosaurio", "Los orcalitos", "Pingüino salamino",
            "Job Job Job sahur", "Karkerkar sahur", "Ladrillo de sandía de gorillo", "Tracoducotulu delapeladuzcruz",
            "Pingüino cocosino", "Te te te sahur", "Aguacate de pipi", "Las Vaquitas saturnitas",
            "Chicletera Bicicliteira", "Los combinasionas", "Esok Sekolah", "Pichione de Maquina",
            "Frigo camello", "Perochello lemonchello", "Noobini pizzanini", "Boneca ambalabu",
            "Tralalero tralala", "Odin din din dun", "Chef abracadra", "Cocofanto elefanto",
            "Brri brri bicis dicus bombicus", "Burbaloni loliloli", "Brr ver patapin", "Tigrolini watermelonini",
            "Tripi tropi", "Bandito bobritto", "Tim Cheese", "Vaca saturno saturnita",
            "Pipi kiwi", "Pandacini bananini", "Girafa celestre", "Génster fotera",
            "Las tralaleritas", "Ta ta ta sahur", "Rhino tosterino", "Gattatino Hynanin",
            "Talpa de fero", "Bombobini Crostini", "Sammyni Spyderini", "Tigroligre frutoni",
            "Frutodrilo glorbo", "Orcalero orcala", "Blueberrinni optopussini", "Balerino lolo",
            "Lionel cactuseli", "Matteo", "Capuchino Assasino", "Capuchina Assasina",
            "Los tungtungtungcitos", "Los crocodilitos", "Taco de tipo topi", "Tralalita tralala",
            "Garama and madundung", "Unclito samito", "Los matteos",
            "No my hospod", "Mama de cocosini", "Avocadorilla", "Agarrini la palini",
            "Tucano Banano", "Ti ti ti sahur", "Urubini flaminguini", "Pipi corni",
            "Bulbito bandito traktorito", "Tripi Tropi Tripi tripa", "Sigma boy",
            "Hospot", "Nuclearo dinossauro", "Trenostruzzo turbo 3000", "Tortuguini dragonfrutini",
            "Grande combinación", "Spioniro Golubiro", "Abocadini Guffo", "Bombardino crocodilo",
            "Espresso Señora", "Caballo virtuoso", "Trulimero trulichina",
            "Bombardini gusini", "Bananita delphinita", "Graipuss medusi", "Lirili laria",
            "Ananasini", "Tric Trac baraboom", "Zibra Zubra zibralini",
            "Los Tralaleritos", "Strawberreli flamengini", "Cacto Hipopótamo", "Chimpanzini bannanini"
        ].sort();

        const container = document.getElementById('container');
        const counter = document.getElementById('counter');

        function updateCounter() {
            const checked = document.querySelectorAll('.card.checked').length;
            counter.innerText = `Obtenus : ${checked} / ${items.length}`;
        }

        items.forEach((name) => {
            const saveKey = 'lava_final_v3_' + name.replace(/\s/g, '_');
            const isChecked = localStorage.getItem(saveKey) === 'true';
            
            const card = document.createElement('div');
            card.className = `card ${isChecked ? 'checked' : ''}`;
            card.innerHTML = `<span>${name}</span><div class="checkbox"></div>`;

            card.addEventListener('click', () => {
                const nowChecked = !card.classList.contains('checked');
                card.classList.toggle('checked');
                localStorage.setItem(saveKey, nowChecked);
                updateCounter();
            });

            container.appendChild(card);
        });

        updateCounter();
    </script>
</body>
</html>
